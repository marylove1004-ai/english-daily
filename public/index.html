<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Daily</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080d16; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1623; }
    ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .speaking-pulse { animation: pulse 1.5s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── API ─────────────────────────────────────────────────────────
    async function callAI(userMsg, system, useSearch = false) {
      const body = {
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system,
        messages: [{ role: "user", content: userMsg }],
      };
      if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || "API 오류: " + res.status);
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.content.filter(b => b.type === "text").map(b => b.text).join("");
    }

function parseJSON(text) {
  let clean = text.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
  const start = clean.indexOf('{');
  const end = clean.lastIndexOf('}');
  if (start !== -1 && end !== -1) clean = clean.slice(start, end + 1);
  try {
    return JSON.parse(clean);
  } catch {
    // 줄바꿈 제거 후 재시도
    clean = clean.replace(/[\r\n]+/g, " ").replace(/,\s*([}\]])/g, '$1');
    try {
      return JSON.parse(clean);
    } catch {
      // 문자열 내 특수문자 이스케이프 후 재시도
      clean = clean.replace(/([^\\])'(?=[^,}\]:])/g, "$1\\'");
      return JSON.parse(clean);
    }
  }
}

    // ── TTS (브라우저 내장 음성) ─────────────────────────────────────
    function speak(text, onEnd) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = "en-US";
      utt.rate = 0.9;
      utt.pitch = 1;
      // 영어 목소리 우선 선택
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v => v.lang.startsWith("en") && v.name.includes("Google"))
        || voices.find(v => v.lang.startsWith("en-US"))
        || voices.find(v => v.lang.startsWith("en"));
      if (enVoice) utt.voice = enVoice;
      if (onEnd) utt.onend = onEnd;
      window.speechSynthesis.speak(utt);
    }
    function stopSpeak() { window.speechSynthesis.cancel(); }

    // ── Streak ───────────────────────────────────────────────────────
    function loadStreak() {
      try {
        const d = JSON.parse(localStorage.getItem("eng_streak") || "{}");
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (d.lastDate === new Date().toDateString()) return d.streak || 0;
        if (d.lastDate === yesterday) return d.streak || 0;
        return 0;
      } catch { return 0; }
    }
    function saveStreak(n) {
      localStorage.setItem("eng_streak", JSON.stringify({ streak: n, lastDate: new Date().toDateString() }));
    }

    // ── Design ───────────────────────────────────────────────────────
    const C = {
      bg: "#080d16", card: "#0f1623", cardBorder: "#1e2d45",
      cream: "#f0e8d5", creamMuted: "#a89880",
      gold: "#c8962a", goldLight: "#e8b84b",
      success: "#34d399", error: "#f87171", muted: "#4a5568",
      blue: "#3b8eff",
    };
    const CAT_COLOR = {
      "World News": "#3b82f6", "Business": "#f59e0b",
      "Technology": "#8b5cf6", "Entertainment": "#ec4899", "Science & Health": "#10b981",
    };
    const S = {
      app: { minHeight: "100vh", background: C.bg, color: C.cream, fontFamily: "'Lora', Georgia, serif", paddingBottom: 60 },
      header: { borderBottom: `1px solid ${C.cardBorder}`, padding: "18px 28px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: C.bg, zIndex: 100 },
      masthead: { fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 600, letterSpacing: "0.08em", color: C.gold },
      body: { maxWidth: 680, margin: "0 auto", padding: "0 20px" },
      card: { background: C.card, border: `1px solid ${C.cardBorder}`, borderRadius: 12, padding: "24px 28px", marginBottom: 16 },
      btn: { background: C.gold, color: C.bg, border: "none", borderRadius: 8, padding: "14px 28px", fontSize: 15, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", width: "100%", letterSpacing: "0.02em" },
      btnSec: { background: "transparent", color: C.creamMuted, border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "12px 24px", fontSize: 14, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", width: "100%", marginTop: 10 },
      label: { fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: C.creamMuted, marginBottom: 8, display: "block" },
      h2: { fontFamily: "'Cormorant Garamond', serif", fontSize: 26, fontWeight: 600, color: C.cream, margin: "0 0 6px" },
      h3: { fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, letterSpacing: "0.1em", textTransform: "uppercase", color: C.gold, margin: "0 0 12px" },
      textarea: { width: "100%", background: "#0a1220", border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: 16, color: C.cream, fontFamily: "'Lora', serif", fontSize: 15, lineHeight: 1.7, resize: "vertical", outline: "none", boxSizing: "border-box", minHeight: 140 },
    };

    // ── Sub Components ───────────────────────────────────────────────
    function LoadingScreen({ msg }) {
      const [dots, setDots] = useState(".");
      useEffect(() => {
        const t = setInterval(() => setDots(d => d.length >= 3 ? "." : d + "."), 500);
        return () => clearInterval(t);
      }, []);
      return (
        <div style={{ textAlign: "center", padding: "80px 20px" }}>
          <div style={{ fontSize: 40, marginBottom: 20 }}>🎧</div>
          <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 24, color: C.cream, marginBottom: 8 }}>{msg}{dots}</div>
          <div style={{ color: C.muted, fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}>잠시만 기다려주세요</div>
        </div>
      );
    }

    function StepBar({ step }) {
      const steps = ["주제", "스피킹", "피드백", "완료"];
      return (
        <div style={{ display: "flex", alignItems: "center", marginBottom: 28, marginTop: 4 }}>
          {steps.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", flex: i < steps.length - 1 ? 1 : 0 }}>
              <div style={{
                width: 28, height: 28, borderRadius: "50%",
                background: i < step ? C.gold : i === step ? C.goldLight : C.cardBorder,
                color: i <= step ? C.bg : C.muted,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 11, fontFamily: "'DM Sans', sans-serif", fontWeight: 700, flexShrink: 0,
              }}>
                {i < step ? "✓" : i + 1}
              </div>
              {i < steps.length - 1 && (
                <div style={{ flex: 1, height: 1, background: i < step ? C.gold : C.cardBorder, margin: "0 4px" }} />
              )}
            </div>
          ))}
        </div>
      );
    }

    function TopicCard({ topic, onSelect }) {
      const [hov, setHov] = useState(false);
      const diff = { Beginner: "#34d399", Intermediate: C.gold, Advanced: "#f87171" };
      return (
        <div onClick={() => onSelect(topic)}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ ...S.card, cursor: "pointer", border: `1px solid ${hov ? C.gold : C.cardBorder}`, transition: "all 0.2s", transform: hov ? "translateY(-2px)" : "none" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 20 }}>{topic.emoji}</span>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: CAT_COLOR[topic.category] || C.gold }}>
                {topic.category}
              </span>
            </div>
            <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: diff[topic.difficulty] || C.gold, background: (diff[topic.difficulty] || C.gold) + "22", borderRadius: 20, padding: "3px 10px" }}>
              {topic.difficulty}
            </span>
          </div>
          <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, fontWeight: 600, color: C.cream, marginBottom: 6 }}>{topic.title}</div>
          <div style={{ fontSize: 14, color: C.creamMuted, lineHeight: 1.6 }}>{topic.teaser}</div>
        </div>
      );
    }

    // TTS 버튼 컴포넌트
    function SpeakButton({ text, label = "🔊 듣기" }) {
      const [playing, setPlaying] = useState(false);
      function toggle() {
        if (playing) { stopSpeak(); setPlaying(false); }
        else { setPlaying(true); speak(text, () => setPlaying(false)); }
      }
      return (
        <button onClick={toggle} style={{
          background: playing ? "#1e3a5f" : "#0d1f35",
          border: `1px solid ${playing ? C.blue : C.cardBorder}`,
          borderRadius: 8, padding: "10px 18px",
          color: playing ? C.blue : C.creamMuted,
          fontFamily: "'DM Sans', sans-serif", fontSize: 13,
          cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
        }}>
          <span className={playing ? "speaking-pulse" : ""}>{playing ? "⏹ 중지" : label}</span>
        </button>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("home");
      const [streak, setStreak] = useState(0);
      const [topics, setTopics] = useState([]);
      const [topic, setTopic] = useState(null);
      const [lesson, setLesson] = useState(null);
      const [userResp, setUserResp] = useState("");
      const [feedback, setFeedback] = useState(null);
      const [userFollowup, setUserFollowup] = useState("");
      const [finalFb, setFinalFb] = useState(null);
      const [loadingMsg, setLoadingMsg] = useState("");
      const [error, setError] = useState(null);
      const [vocabOpen, setVocabOpen] = useState(false);

      useEffect(() => { setStreak(loadStreak()); }, []);

      const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

      async function run(fn, fallbackScreen) {
        setError(null);
        try { await fn(); }
        catch (e) { setError(e.message || "오류가 발생했습니다."); if (fallbackScreen) setScreen(fallbackScreen); }
      }

      async function fetchTopics() {
        setLoadingMsg("최신 뉴스를 검색하는 중");
        setScreen("loading");
        await run(async () => {
          const sys = `English learning assistant. Search the web for today's 5 diverse interesting topics. Return ONLY valid JSON no markdown:
{"topics":[{"id":1,"category":"World News","emoji":"🌍","title":"Short title max 8 words","teaser":"One engaging sentence in English","difficulty":"Intermediate"}]}
Categories: World News, Business, Technology, Entertainment, Science & Health. Difficulty: Beginner/Intermediate/Advanced.`;
          const text = await callAI("Find 5 diverse interesting current news topics for English learners today.", sys, true);
          setTopics(parseJSON(text).topics);
          setScreen("selecting");
        }, "home");
      }

      async function startLesson(t) {
        setTopic(t);
        setVocabOpen(false);
        setLoadingMsg("레슨을 준비하는 중");
        setScreen("loading");
        await run(async () => {
          // 읽기 최소화: 짧은 요약 + 핵심 어휘 3개 + 스피킹 프롬프트 2개
          const sys = `English teacher. Return ONLY valid JSON no markdown:
{"summary":"2 sentence English summary, simple and clear","vocabulary":[{"word":"word","pos":"noun","definition":"한국어로 간단한 뜻","example":"natural example sentence"}],"prompts":[{"question":"First open-ended speaking question about this topic","level":"Basic"},{"question":"Second deeper follow-up speaking question","level":"Advanced"}]}
Exactly 3 vocabulary words. Definitions must be in Korean. 2 speaking prompts.`;
          const text = await callAI(`Create English speaking lesson about: ${t.title}\nCategory: ${t.category}\nContext: ${t.teaser}`, sys, true);
          setLesson(parseJSON(text));
          setScreen("overview");
        }, "selecting");
      }

      async function submitSpeaking() {
        if (!userResp.trim()) return;
        setLoadingMsg("답변을 분석하는 중");
        setScreen("loading");
        await run(async () => {
          const sys = `English teacher giving speaking feedback. Return ONLY valid JSON no markdown.
IMPORTANT: All explanations, corrections, and expression usage notes must be written in Korean (한국어).
{"correctedVersion":"Naturally corrected English version of student response","corrections":[{"original":"exact phrase student used","correction":"better English version","explanation":"왜 틀렸는지 한국어로 설명"}],"naturalExpressions":[{"expression":"native English phrase","usage":"이 표현을 언제 어떻게 쓰는지 한국어로 설명"}],"followUpQuestion":"One engaging follow-up question in English","encouragement":"짧은 격려 한마디 한국어로"}
0-3 corrections only for real errors. Exactly 3 naturalExpressions.`;
          const text = await callAI(`Topic: ${topic.title}\nPrompt: ${lesson.prompts[0].question}\nStudent said: ${userResp}`, sys);
          setFeedback(parseJSON(text));
          setScreen("feedback");
        }, "speaking");
      }

      async function submitFollowup() {
        if (!userFollowup.trim()) return;
        setLoadingMsg("최종 피드백을 정리하는 중");
        setScreen("loading");
        await run(async () => {
          const sys = `English teacher, final feedback. Return ONLY valid JSON no markdown.
IMPORTANT: All explanations must be in Korean (한국어).
{"correctedVersion":"corrected English version","corrections":[{"original":"","correction":"","explanation":"한국어로 설명"}],"finalNote":"오늘 학습에 대한 따뜻한 마무리 코멘트 한국어로 2-3문장","todaysPhrases":["오늘 배운 핵심 영어 표현 1","핵심 표현 2","핵심 표현 3"]}
0-3 corrections.`;
          const text = await callAI(`Topic: ${topic.title}\nQ: ${feedback.followUpQuestion}\nAnswer: ${userFollowup}`, sys);
          const data = parseJSON(text);
          setFinalFb(data);
          const newStreak = streak + 1;
          setStreak(newStreak);
          saveStreak(newStreak);
          setScreen("complete");
        }, "feedback");
      }

      function reset() {
        setTopic(null); setLesson(null); setUserResp(""); setFeedback(null);
        setUserFollowup(""); setFinalFb(null); setError(null); stopSpeak(); setScreen("home");
      }

      return (
        <div style={S.app}>
          {/* Header */}
          <div style={S.header}>
            <div style={S.masthead}>ENGLISH DAILY</div>
            <div style={{ textAlign: "right" }}>
              {streak > 0 && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.gold }}>🔥 {streak}일 연속</div>}
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: C.muted, marginTop: 2 }}>{new Date().toLocaleDateString("ko-KR")}</div>
            </div>
          </div>

          {error && (
            <div style={{ background: "#2a0a0a", borderBottom: `1px solid #5a2020`, padding: "12px 28px", color: C.error, fontFamily: "'DM Sans', sans-serif", fontSize: 13, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span>⚠️ {error}</span>
              <button onClick={() => setError(null)} style={{ background: "none", border: "none", color: C.error, cursor: "pointer", fontSize: 16 }}>✕</button>
            </div>
          )}

          <div style={S.body}>
            {screen === "loading" && <LoadingScreen msg={loadingMsg} />}

            {/* HOME */}
            {screen === "home" && (
              <div style={{ paddingTop: 48 }}>
                <div style={{ ...S.label, textAlign: "center" }}>{today}</div>
                <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 44, fontWeight: 400, lineHeight: 1.15, color: C.cream, textAlign: "center", margin: "0 0 10px" }}>
                  오늘의 영어,<br /><span style={{ color: C.gold, fontStyle: "italic" }}>함께 시작해요</span>
                </div>
                <p style={{ textAlign: "center", color: C.creamMuted, fontSize: 15, lineHeight: 1.8, margin: "0 0 40px" }}>
                  최신 뉴스 주제로 듣고 말하고 교정받는<br />나만의 AI 영어 스피킹 루틴
                </p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 36 }}>
                  {[["🎧","듣고 따라하기"],["🗣️","스피킹 + 교정"],["🇰🇷","한국어 설명"]].map(([e,l]) => (
                    <div key={l} style={{ ...S.card, textAlign: "center", padding: "20px 12px" }}>
                      <div style={{ fontSize: 24, marginBottom: 8 }}>{e}</div>
                      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: C.creamMuted }}>{l}</div>
                    </div>
                  ))}
                </div>
                <button style={S.btn} onClick={fetchTopics}>오늘의 주제 가져오기 →</button>
              </div>
            )}

            {/* SELECTING */}
            {screen === "selecting" && (
              <div style={{ paddingTop: 36 }}>
                <StepBar step={0} />
                <div style={S.label}>STEP 1 — 주제 선택</div>
                <div style={S.h2}>오늘 어떤 주제로 말해볼까요?</div>
                <p style={{ color: C.creamMuted, fontSize: 14, marginBottom: 24, lineHeight: 1.7 }}>하나를 선택하면 스피킹 레슨이 바로 시작됩니다.</p>
                {topics.map(t => <TopicCard key={t.id} topic={t} onSelect={startLesson} />)}
                <button style={S.btn} onClick={fetchTopics}>🔄 다른 주제 가져오기</button>
              </div>
            )}

            {/* OVERVIEW → 빠르게 스피킹으로 */}
            {screen === "overview" && lesson && (
              <div style={{ paddingTop: 36 }}>
                <StepBar step={1} />
                <div style={S.label}>STEP 2 — 주제 파악 & 스피킹</div>
                <div style={S.h2}>{topic?.title}</div>
                <p style={{ color: C.creamMuted, fontSize: 13, fontFamily: "'DM Sans', sans-serif", marginBottom: 20 }}>{topic?.emoji} {topic?.category} · {topic?.difficulty}</p>

                {/* 짧은 요약 + 듣기 버튼 */}
                <div style={{ ...S.card, borderLeft: `3px solid ${C.gold}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div style={S.h3}>📋 Brief Summary</div>
                    <SpeakButton text={lesson.summary} label="🔊 읽어주기" />
                  </div>
                  <p style={{ color: C.cream, lineHeight: 1.85, fontSize: 15, margin: 0 }}>{lesson.summary}</p>
                </div>

                {/* 어휘 접기/펼치기 */}
                <div style={S.card}>
                  <button onClick={() => setVocabOpen(v => !v)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", padding: 0 }}>
                    <div style={S.h3}>📚 핵심 어휘 3개 {vocabOpen ? "▲" : "▼"}</div>
                  </button>
                  {vocabOpen && lesson.vocabulary?.map((v, i) => (
                    <div key={i} style={{ background: "#0a1220", border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "12px 16px", marginTop: 10 }}>
                      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
                        <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, fontWeight: 600, color: C.goldLight }}>{v.word}</span>
                        <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: C.muted }}>{v.pos}</span>
                        <span style={{ fontSize: 13, color: C.creamMuted }}>— {v.definition}</span>
                      </div>
                      <div style={{ fontSize: 13, color: C.creamMuted, fontStyle: "italic" }}>"{v.example}"</div>
                    </div>
                  ))}
                </div>

                {/* 스피킹 프롬프트 미리보기 + 바로 시작 */}
                <div style={{ ...S.card, background: "#0d1520", borderColor: "#2a4a6a" }}>
                  <div style={S.h3}>🎯 오늘의 스피킹 질문</div>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 21, lineHeight: 1.5, color: C.cream, marginBottom: 16 }}>
                    {lesson.prompts?.[0]?.question}
                  </div>
                  <SpeakButton text={lesson.prompts?.[0]?.question} label="🔊 질문 듣기" />
                </div>

                <button style={S.btn} onClick={() => setScreen("speaking")}>
                  🗣️ 스피킹 시작하기 →
                </button>
              </div>
            )}

            {/* SPEAKING */}
            {screen === "speaking" && lesson && (
              <div style={{ paddingTop: 36 }}>
                <StepBar step={1} />
                <div style={S.label}>STEP 2 — 스피킹 연습</div>
                <div style={S.h2}>소리 내어 말해보세요</div>

                {/* 질문 카드 + 듣기 */}
                <div style={{ ...S.card, borderLeft: `3px solid ${C.gold}`, background: "#0d1520" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div style={S.h3}>💬 Speaking Question</div>
                    <SpeakButton text={lesson.prompts?.[0]?.question} label="🔊 듣기" />
                  </div>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, lineHeight: 1.55, color: C.cream }}>
                    {lesson.prompts?.[0]?.question}
                  </div>
                </div>

                {/* 안내 */}
                <div style={{ background: "#0a150a", border: `1px solid #1e3a1e`, borderRadius: 10, padding: "14px 18px", marginBottom: 16 }}>
                  <div style={{ color: C.success, fontFamily: "'DM Sans', sans-serif", fontSize: 13, lineHeight: 1.7 }}>
                    💡 <strong>이렇게 해보세요</strong><br />
                    1. 🔊 듣기로 질문을 들어보세요<br />
                    2. 소리 내어 영어로 말해보세요 (30초~1분)<br />
                    3. 말한 내용을 아래에 영어로 입력하세요
                  </div>
                </div>

                <div style={S.card}>
                  <div style={S.h3}>✍️ 영어로 입력하기</div>
                  <textarea style={S.textarea} value={userResp} onChange={e => setUserResp(e.target.value)}
                    placeholder="Type your spoken response in English here..." />
                  <div style={{ fontSize: 12, color: C.muted, marginTop: 8, fontFamily: "'DM Sans', sans-serif" }}>
                    {userResp.trim() ? `${userResp.trim().split(/\s+/).length} words` : "최소 2~3문장을 목표로 해보세요"}
                  </div>
                </div>

                <button style={{ ...S.btn, opacity: userResp.trim() ? 1 : 0.4 }} onClick={submitSpeaking} disabled={!userResp.trim()}>
                  피드백 받기 →
                </button>
                <button style={S.btnSec} onClick={() => setScreen("overview")}>← 주제로 돌아가기</button>
              </div>
            )}

            {/* FEEDBACK */}
            {screen === "feedback" && feedback && (
              <div style={{ paddingTop: 36 }}>
                <StepBar step={2} />
                <div style={S.label}>STEP 3 — 피드백</div>
                <div style={S.h2}>피드백 결과</div>
                <p style={{ color: C.gold, fontSize: 14, fontFamily: "'DM Sans', sans-serif", marginBottom: 24, fontStyle: "italic" }}>
                  {feedback.encouragement}
                </p>

                {/* 교정된 버전 + 듣기 */}
                <div style={S.card}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div style={S.h3}>✅ 교정된 버전</div>
                    <SpeakButton text={feedback.correctedVersion} label="🔊 들어보기" />
                  </div>
                  <p style={{ color: C.success, lineHeight: 1.85, fontSize: 15, margin: 0, fontStyle: "italic" }}>{feedback.correctedVersion}</p>
                </div>

                {/* 교정 포인트 - 한국어 설명 */}
                {feedback.corrections?.length > 0 && (
                  <div style={S.card}>
                    <div style={S.h3}>📝 교정 포인트</div>
                    {feedback.corrections.map((c, i) => (
                      <div key={i} style={{ background: "#0a1220", border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "14px 16px", marginBottom: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                          <span style={{ fontSize: 13, color: C.error, textDecoration: "line-through", fontStyle: "italic" }}>{c.original}</span>
                          <span style={{ color: C.muted }}>→</span>
                          <span style={{ fontSize: 13, color: C.success, fontWeight: 600 }}>{c.correction}</span>
                        </div>
                        {/* 설명 한국어 */}
                        <div style={{ fontSize: 13, color: C.creamMuted, fontFamily: "'DM Sans', sans-serif", paddingTop: 6, borderTop: `1px solid ${C.cardBorder}` }}>
                          🇰🇷 {c.explanation}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {feedback.corrections?.length === 0 && (
                  <div style={{ ...S.card, borderColor: "#1e3a2a", background: "#0a1a0f" }}>
                    <div style={{ color: C.success, fontFamily: "'DM Sans', sans-serif", fontSize: 14 }}>🎉 완벽해요! 교정할 부분이 없습니다.</div>
                  </div>
                )}

                {/* 자연스러운 표현 - 한국어 설명 */}
                <div style={S.card}>
                  <div style={S.h3}>⚡ 원어민 표현 3가지</div>
                  {feedback.naturalExpressions?.map((e, i) => (
                    <div key={i} style={{ background: "#0a1220", border: `1px solid #1e3a2a`, borderRadius: 8, padding: "14px 16px", marginBottom: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                        <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, color: C.goldLight }}>"{e.expression}"</div>
                        <SpeakButton text={e.expression} label="🔊" />
                      </div>
                      {/* 사용법 한국어 */}
                      <div style={{ fontSize: 13, color: C.creamMuted, fontFamily: "'DM Sans', sans-serif" }}>
                        🇰🇷 {e.usage}
                      </div>
                    </div>
                  ))}
                </div>

                {/* 추가 질문 */}
                <div style={{ ...S.card, borderLeft: `3px solid ${C.gold}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div style={S.h3}>💬 추가 질문</div>
                    <SpeakButton text={feedback.followUpQuestion} label="🔊 듣기" />
                  </div>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, color: C.cream, marginBottom: 16 }}>
                    {feedback.followUpQuestion}
                  </div>
                  <div style={{ background: "#0a150a", border: `1px solid #1e3a1e`, borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: C.success, fontFamily: "'DM Sans', sans-serif" }}>
                    💡 먼저 소리 내어 말해보고, 아래에 입력하세요
                  </div>
                  <textarea style={S.textarea} value={userFollowup} onChange={e => setUserFollowup(e.target.value)}
                    placeholder="Answer in English..." />
                </div>

                <button style={{ ...S.btn, opacity: userFollowup.trim() ? 1 : 0.4 }} onClick={submitFollowup} disabled={!userFollowup.trim()}>
                  레슨 완료하기 →
                </button>
              </div>
            )}

            {/* COMPLETE */}
            {screen === "complete" && finalFb && (
              <div style={{ paddingTop: 48 }}>
                <div style={{ textAlign: "center", marginBottom: 32 }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 36, color: C.gold, marginBottom: 12 }}>오늘의 학습 완료!</div>
                  <div style={{ display: "inline-block", background: C.gold + "22", border: `1px solid ${C.gold}`, borderRadius: 20, padding: "6px 20px", fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: C.gold }}>
                    🔥 {streak}일 연속 학습 중
                  </div>
                </div>

                {finalFb.corrections?.length > 0 && (
                  <div style={S.card}>
                    <div style={S.h3}>📝 마지막 교정</div>
                    {finalFb.corrections.map((c, i) => (
                      <div key={i} style={{ background: "#0a1220", border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "14px 16px", marginBottom: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                          <span style={{ fontSize: 13, color: C.error, textDecoration: "line-through", fontStyle: "italic" }}>{c.original}</span>
                          <span style={{ color: C.muted }}>→</span>
                          <span style={{ fontSize: 13, color: C.success }}>{c.correction}</span>
                        </div>
                        <div style={{ fontSize: 13, color: C.creamMuted, fontFamily: "'DM Sans', sans-serif", paddingTop: 6, borderTop: `1px solid ${C.cardBorder}` }}>
                          🇰🇷 {c.explanation}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                <div style={S.card}>
                  <div style={S.h3}>💡 오늘 배운 핵심 표현</div>
                  {finalFb.todaysPhrases?.map((p, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", background: "#0a1220", borderRadius: 8, marginBottom: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <span style={{ color: C.gold, fontFamily: "'DM Sans', sans-serif", fontWeight: 600 }}>{String(i + 1).padStart(2, "0")}</span>
                        <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 17, color: C.cream }}>{p}</span>
                      </div>
                      <SpeakButton text={p} label="🔊" />
                    </div>
                  ))}
                </div>

                <div style={{ ...S.card, borderColor: "#1e3a2a", background: "#091510" }}>
                  <div style={{ color: C.creamMuted, lineHeight: 1.8, fontSize: 15 }}>{finalFb.finalNote}</div>
                </div>

                <button style={S.btn} onClick={reset}>홈으로 돌아가기</button>
                <button style={S.btnSec} onClick={() => { reset(); setTimeout(fetchTopics, 100); }}>다른 주제로 한 번 더 →</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
