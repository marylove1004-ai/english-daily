<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Daily</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080d16; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1623; }
    ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes ripple { 0%{transform:scale(1);opacity:0.6} 100%{transform:scale(2.2);opacity:0} }
    .mic-pulse { animation: pulse 1s infinite; }
    .ripple::after { content:''; position:absolute; inset:0; border-radius:50%; border:2px solid #e8b84b; animation:ripple 1.2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Fix 4: LANG_CONFIG에 카테고리, 카테고리 색상 포함 ────────────
    const LANG_CONFIG = {
      English: {
        code: "en-US", name: "영어", title: "ENGLISH DAILY", emoji: "🇬🇧", voiceStart: "en",
        // 재미있는 카테고리 믹스
        categories: ["Celebrity & Gossip", "Movies & TV", "Funny & Weird", "Music & Pop", "Tech & Life", "Sports Drama", "Travel & Food", "World News"],
        topicPrompt: "Find 5 diverse and FUN topics in English today. Mix celebrity gossip, movie news, funny/weird stories, pop culture, lifestyle — NOT just serious world news. Make it feel like reading a fun magazine, not a newspaper.",
      },
      French: {
        code: "fr-FR", name: "프랑스어", title: "FRENCH DAILY", emoji: "🇫🇷", voiceStart: "fr",
        categories: ["Célébrités", "Cinéma & Séries", "Insolite", "Musique & Pop", "Tech & Vie", "Sport", "Voyage & Cuisine", "Actualités"],
        topicPrompt: "Find 5 diverse and FUN topics in French today. Mix celebrity news, French cinema, funny/bizarre stories, pop culture, lifestyle — make it engaging and fun, not dry news.",
      },
    };

    // ── API ──────────────────────────────────────────────────────────
    async function callAI(userMsg, system, useSearch=false) {
      const body = {model:"claude-sonnet-4-20250514",max_tokens:1500,system,messages:[{role:"user",content:userMsg}]};
      if(useSearch) body.tools=[{type:"web_search_20250305",name:"web_search"}];
      const res = await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||"API 오류");}
      const data=await res.json();
      if(data.error) throw new Error(data.error);
      return data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    }

    function parseJSON(text) {
      let c=text.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
      const s=c.indexOf('{'),e=c.lastIndexOf('}');
      if(s!==-1&&e!==-1) c=c.slice(s,e+1);
      try{return JSON.parse(c);}
      catch{c=c.replace(/[\r\n]+/g," ").replace(/,\s*([}\]])/g,'$1');return JSON.parse(c);}
    }

    // ── Fix 2: TTS — 언어별 음성 매칭 + 3단계 폴백 ───────────────────
    function speak(text, rate=0.85, onEnd, langCode="en-US", voiceStart="en") {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = langCode;
      u.rate = rate;
      const v = window.speechSynthesis.getVoices();
      const voice =
        v.find(x => x.lang === langCode && x.name.includes("Google")) || // 정확 매칭 + Google
        v.find(x => x.lang === langCode) ||                               // 정확 매칭
        v.find(x => x.lang.startsWith(voiceStart)) ||                     // 언어 코드 시작
        v.find(x => x.lang.includes(voiceStart));                         // 포함 폴백
      if(voice) u.voice = voice;
      if(onEnd) u.onend = onEnd;
      window.speechSynthesis.speak(u);
    }
    function stopSpeak(){window.speechSynthesis.cancel();}

    // ── STT ──────────────────────────────────────────────────────────
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const hasMic=!!SR;

    // ── Streak (언어별 분리) ──────────────────────────────────────────
    function loadStreak(langKey){
      try{
        const d=JSON.parse(localStorage.getItem(`daily_streak_${langKey}`)||"{}");
        const today=new Date().toDateString(),yesterday=new Date(Date.now()-86400000).toDateString();
        if(d.lastDate===today||d.lastDate===yesterday) return d.streak||0;
        return 0;
      }catch{return 0;}
    }
    function saveStreak(n,langKey){
      localStorage.setItem(`daily_streak_${langKey}`,JSON.stringify({streak:n,lastDate:new Date().toDateString()}));
    }

    // ── Share ─────────────────────────────────────────────────────────
    function buildShareText(topic,lesson,selectedQ,feedback,finalFb,streak,langTitle) {
      const date=new Date().toLocaleDateString("ko-KR");
      let t=`📖 ${langTitle} 복습 노트\n📅 ${date}  🔥 ${streak}일 연속\n${'─'.repeat(30)}\n\n`;
      t+=`🎯 오늘의 주제\n${topic?.title}\n${topic?.teaser}\n\n`;
      if(lesson?.expressions?.length){
        t+=`⚡ 핵심 표현\n`;
        lesson.expressions.forEach(e=>{t+=`• "${e.phrase}" — ${e.korean}\n  예: ${e.example}\n`;});
        t+=`\n`;
      }
      if(lesson?.shadowSentences?.length){
        t+=`🔁 쉐도잉 문장\n`;
        lesson.shadowSentences.forEach((s,i)=>{t+=`${i+1}. ${s.text}\n   🇰🇷 ${s.meaning}\n`;});
        t+=`\n`;
      }
      if(selectedQ) t+=`💬 스피킹 질문 (${selectedQ.level})\n${selectedQ.question}\n\n`;
      if(feedback?.correctedVersion) t+=`✅ 교정된 답변\n${feedback.correctedVersion}\n\n`;
      if(feedback?.corrections?.length){
        t+=`📝 교정 포인트\n`;
        feedback.corrections.forEach(c=>{t+=`• ${c.original} → ${c.correction}\n  🇰🇷 ${c.explanation}\n`;});
        t+=`\n`;
      }
      if(feedback?.naturalExpressions?.length){
        t+=`⚡ 원어민 표현\n`;
        feedback.naturalExpressions.forEach(e=>{t+=`• "${e.expression}"\n  🇰🇷 ${e.usage}\n`;});
        t+=`\n`;
      }
      if(finalFb?.todaysPhrases?.length){
        t+=`💡 오늘 배운 핵심 표현\n`;
        finalFb.todaysPhrases.forEach((p,i)=>{t+=`${i+1}. ${p}\n`;});
        t+=`\n`;
      }
      if(finalFb?.finalNote) t+=`${finalFb.finalNote}\n`;
      return t;
    }

    async function shareResult(text,title) {
      if(navigator.share){try{await navigator.share({title:title+" 복습 노트",text});return "shared";}catch{}}
      try{await navigator.clipboard.writeText(text);return "copied";}
      catch{return "failed";}
    }

    // ── Design ───────────────────────────────────────────────────────
    const C={bg:"#080d16",card:"#0f1623",cardBorder:"#1e2d45",cream:"#f0e8d5",creamMuted:"#a89880",gold:"#c8962a",goldLight:"#e8b84b",success:"#34d399",error:"#f87171",muted:"#4a5568",blue:"#3b8eff"};
    const LEVEL_COLOR={Beginner:"#34d399",Intermediate:C.gold,Advanced:"#f87171"};
    const LEVEL_EMOJI={Beginner:"🟢",Intermediate:"🟡",Advanced:"🔴"};
    // Fix 4: 카테고리 색상 — 더 많은 카테고리 커버
    const CAT_COLOR={
      "Celebrity & Gossip":"#ec4899","Movies & TV":"#8b5cf6","Funny & Weird":"#f59e0b",
      "Music & Pop":"#06b6d4","Tech & Life":"#3b82f6","Sports Drama":"#10b981",
      "Travel & Food":"#f97316","World News":"#6366f1",
      "Célébrités":"#ec4899","Cinéma & Séries":"#8b5cf6","Insolite":"#f59e0b",
      "Musique & Pop":"#06b6d4","Tech & Vie":"#3b82f6","Sport":"#10b981",
      "Voyage & Cuisine":"#f97316","Actualités":"#6366f1",
    };
    const S={
      app:{minHeight:"100vh",background:C.bg,color:C.cream,fontFamily:"'Lora',Georgia,serif",paddingBottom:60},
      header:{borderBottom:`1px solid ${C.cardBorder}`,padding:"16px 22px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.bg,zIndex:100},
      masthead:{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,letterSpacing:"0.08em",color:C.gold},
      body:{maxWidth:680,margin:"0 auto",padding:"0 16px"},
      card:{background:C.card,border:`1px solid ${C.cardBorder}`,borderRadius:12,padding:"18px 20px",marginBottom:12},
      btn:{background:C.gold,color:C.bg,border:"none",borderRadius:10,padding:"15px 28px",fontSize:15,fontWeight:600,fontFamily:"'DM Sans',sans-serif",cursor:"pointer",width:"100%"},
      btnSec:{background:"transparent",color:C.creamMuted,border:`1px solid ${C.cardBorder}`,borderRadius:10,padding:"12px 24px",fontSize:14,fontFamily:"'DM Sans',sans-serif",cursor:"pointer",width:"100%",marginTop:10},
      label:{fontFamily:"'DM Sans',sans-serif",fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:C.creamMuted,marginBottom:8,display:"block"},
      h2:{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:C.cream,margin:"0 0 6px"},
      h3:{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,letterSpacing:"0.1em",textTransform:"uppercase",color:C.gold,margin:"0 0 10px"},
      textarea:{width:"100%",background:"#0a1220",border:`1px solid ${C.cardBorder}`,borderRadius:8,padding:14,color:C.cream,fontFamily:"'Lora',serif",fontSize:15,lineHeight:1.7,resize:"vertical",outline:"none",boxSizing:"border-box",minHeight:110},
    };

    // ── Components ───────────────────────────────────────────────────
    function StepBar({step}){
      const steps=["주제","듣기","쉐도잉","말하기","피드백"];
      return(
        <div style={{display:"flex",alignItems:"center",marginBottom:22,marginTop:4}}>
          {steps.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:0}}>
              <div title={s} style={{width:25,height:25,borderRadius:"50%",background:i<step?C.gold:i===step?C.goldLight:C.cardBorder,color:i<=step?C.bg:C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontFamily:"'DM Sans',sans-serif",fontWeight:700,flexShrink:0}}>
                {i<step?"✓":i+1}
              </div>
              {i<steps.length-1&&<div style={{flex:1,height:1,background:i<step?C.gold:C.cardBorder,margin:"0 3px"}}/>}
            </div>
          ))}
        </div>
      );
    }

    function ListenBtn({text,rate=0.85,label="🔊 듣기",langCode="en-US",voiceStart="en"}){
      const [playing,setPlaying]=useState(false);
      function toggle(){if(playing){stopSpeak();setPlaying(false);}else{setPlaying(true);speak(text,rate,()=>setPlaying(false),langCode,voiceStart);}}
      return(
        <button onClick={toggle} style={{background:playing?"#1e3a5f":"#0d1f35",border:`1px solid ${playing?C.blue:C.cardBorder}`,borderRadius:8,padding:"8px 14px",color:playing?C.blue:C.creamMuted,fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          {playing?"⏹ 중지":label}
        </button>
      );
    }

    function TopicCard({topic,onSelect}){
      const [hov,setHov]=useState(false);
      const diff={Beginner:"#34d399",Intermediate:C.gold,Advanced:"#f87171"};
      const catColor=CAT_COLOR[topic.category]||C.gold;
      return(
        <div onClick={()=>onSelect(topic)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          style={{...S.card,cursor:"pointer",border:`1px solid ${hov?C.gold:C.cardBorder}`,transition:"all 0.2s",transform:hov?"translateY(-2px)":"none"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{topic.emoji}</span>
              <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:catColor}}>{topic.category}</span>
            </div>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:diff[topic.difficulty]||C.gold,background:(diff[topic.difficulty]||C.gold)+"22",borderRadius:20,padding:"2px 10px"}}>{topic.difficulty}</span>
          </div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:600,color:C.cream,marginBottom:4}}>{topic.title}</div>
          <div style={{fontSize:13,color:C.creamMuted,lineHeight:1.6}}>{topic.teaser}</div>
        </div>
      );
    }

    function QuestionCard({q,selected,onSelect,langCode,voiceStart}){
      const lc=LEVEL_COLOR[q.level]||C.gold;
      return(
        <div onClick={()=>onSelect(q)}
          style={{...S.card,cursor:"pointer",border:`2px solid ${selected?lc:C.cardBorder}`,background:selected?lc+"11":"#0f1623",transition:"all 0.2s",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:14}}>{LEVEL_EMOJI[q.level]}</span>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:lc}}>{q.level}</span>
            {selected&&<span style={{marginLeft:"auto",fontFamily:"'DM Sans',sans-serif",fontSize:11,color:lc}}>✓ 선택됨</span>}
          </div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:C.cream,lineHeight:1.55,marginBottom:q.hint?10:0}}>{q.question}</div>
          {/* Fix 3: 힌트는 한국어로 명확하게 */}
          {q.hint&&<div style={{fontSize:12,color:C.creamMuted,fontFamily:"'DM Sans',sans-serif",padding:"8px 12px",background:"#0a1220",borderRadius:6}}>💡 {q.hint}</div>}
          <div style={{marginTop:10}}><ListenBtn text={q.question} label="🔊 듣기" langCode={langCode} voiceStart={voiceStart}/></div>
        </div>
      );
    }

    function MicButton({onTranscript,langCode}){
      const [state,setState]=useState("idle");
      const [interim,setInterim]=useState("");
      const recRef=useRef(null);
      function startListen(){
        if(!SR) return;
        stopSpeak();
        const rec=new SR();
        rec.lang=langCode;rec.continuous=true;rec.interimResults=true;
        rec.onresult=(e)=>{
          let fin="",inter="";
          for(let r of e.results){if(r.isFinal)fin+=r[0].transcript+" ";else inter+=r[0].transcript;}
          if(fin) onTranscript(p=>p+fin);
          setInterim(inter);
        };
        rec.onerror=()=>{setState("idle");setInterim("");};
        rec.onend=()=>{setState("done");setInterim("");};
        recRef.current=rec;rec.start();setState("listening");
      }
      function stopListen(){recRef.current?.stop();setState("done");setInterim("");}
      return(
        <div style={{textAlign:"center",padding:"14px 0"}}>
          <div style={{position:"relative",display:"inline-block",marginBottom:10}}>
            <button onClick={state==="listening"?stopListen:startListen}
              className={state==="listening"?"mic-pulse ripple":""}
              style={{width:76,height:76,borderRadius:"50%",background:state==="listening"?"#c8962a22":state==="done"?"#1e3a2a":"#1e2d45",border:`2px solid ${state==="listening"?C.gold:state==="done"?C.success:C.cardBorder}`,fontSize:30,cursor:"pointer",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
              {state==="listening"?"⏹":state==="done"?"✓":"🎤"}
            </button>
          </div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:state==="listening"?C.gold:state==="done"?C.success:C.creamMuted}}>
            {state==="listening"?"듣는 중... 말을 마치면 자동 종료":state==="done"?"녹음 완료":"버튼을 누르고 해당 언어로 말하세요"}
          </div>
          {interim&&<div style={{marginTop:6,color:C.creamMuted,fontSize:13,fontStyle:"italic",padding:"0 16px"}}>{interim}</div>}
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────
    function App(){
      const [screen,setScreen]=useState("home");
      const [activeLang,setActiveLang]=useState("English");
      const [streak,setStreak]=useState(0);
      const [topics,setTopics]=useState([]);
      const [topic,setTopic]=useState(null);
      const [lesson,setLesson]=useState(null);
      const [done,setDone]=useState([]);
      const [selectedQ,setSelectedQ]=useState(null);
      const [userResp,setUserResp]=useState("");
      const [feedback,setFeedback]=useState(null);
      const [followup,setFollowup]=useState("");
      const [finalFb,setFinalFb]=useState(null);
      const [loadingMsg,setLoadingMsg]=useState("");
      const [error,setError]=useState(null);
      const [shareStatus,setShareStatus]=useState("");

      const L=LANG_CONFIG[activeLang];

      useEffect(()=>{setStreak(loadStreak(activeLang));},[activeLang]);

      // Fix 1: 언어 전환 시 상태 초기화
      function switchLang(k){
        if(k===activeLang) return;
        // 레슨 진행 중이면 확인
        if(screen!=="home"&&screen!=="selecting"){
          if(!window.confirm("언어를 바꾸면 현재 레슨이 초기화됩니다. 계속할까요?")) return;
        }
        setActiveLang(k);
        setTopic(null);setLesson(null);setUserResp("");setFeedback(null);
        setFollowup("");setFinalFb(null);setError(null);setDone([]);setSelectedQ(null);
        setTopics([]);
        stopSpeak();
        setScreen("home");
      }

      async function run(fn,fb){
        setError(null);
        try{await fn();}
        catch(e){setError(e.message||"오류 발생");if(fb)setScreen(fb);}
      }

      async function fetchTopics(){
        setLoadingMsg("오늘의 콘텐츠 검색 중");setScreen("loading");
        await run(async()=>{
          // Fix 4: 언어별 카테고리 + 재미있는 주제 프롬프트
          const catList=L.categories.join(", ");
          const sys=`You are a fun ${activeLang} learning assistant. ${L.topicPrompt}
Return ONLY valid JSON no markdown:
{"topics":[{"id":1,"category":"Celebrity & Gossip","emoji":"🌟","title":"Short fun title in ${activeLang}","teaser":"One engaging ${activeLang} sentence that makes people want to read more","difficulty":"Intermediate"}]}
Pick categories from this list: ${catList}
Make topics feel like BuzzFeed or a fun magazine — celebrity drama, movie plot twists, bizarre viral stories, food trends, travel tips, funny sports moments. Avoid dry political or economic topics.`;
          const t=await callAI(L.topicPrompt,sys,true);
          setTopics(parseJSON(t).topics);setScreen("selecting");
        },"home");
      }

      async function startLesson(t){
        setTopic(t);setDone([]);setSelectedQ(null);
        setLoadingMsg("리스닝 콘텐츠 준비 중");setScreen("loading");
        await run(async()=>{
          const sys=`You are a fun ${activeLang} teacher. Return ONLY valid JSON no markdown:
{"summary":"2 engaging ${activeLang} sentences about the topic — write like a fun journalist, not a textbook","shadowSentences":[{"text":"natural conversational ${activeLang} sentence from the topic","meaning":"한국어 뜻"},{"text":"...","meaning":"..."},{"text":"...","meaning":"..."},{"text":"...","meaning":"..."},{"text":"...","meaning":"..."}],"expressions":[{"phrase":"natural ${activeLang} phrase or slang related to topic","korean":"한국어 의미","example":"casual example sentence"},{"phrase":"...","korean":"...","example":"..."},{"phrase":"...","korean":"...","example":"..."}],"speakingQuestions":[{"level":"Beginner","question":"Simple personal question about this topic in ${activeLang}","hint":"이렇게 시작해보세요: (한국어로 구체적인 문장 시작 예시 제공)"},{"level":"Intermediate","question":"More specific question that needs some opinion or experience","hint":""},{"level":"Advanced","question":"Deep analytical question requiring detailed personal stance and reasoning","hint":""}]}
Exactly 5 shadowSentences (short, conversational, fun). Exactly 3 expressions (include slang or idioms if natural). Exactly 3 speakingQuestions. Beginner hint must be written in Korean with a specific example starter.`;
          const t2=await callAI(`Fun ${activeLang} lesson for: ${t.title}\nContext: ${t.teaser}`,sys,true);
          setLesson(parseJSON(t2));setScreen("listening");
        },"selecting");
      }

      async function submitSpeaking(){
        if(!userResp.trim()||!selectedQ) return;
        setLoadingMsg("답변 분석 중");setScreen("loading");
        await run(async()=>{
          const sys=`You are a friendly ${activeLang} teacher. Return ONLY valid JSON no markdown. All explanations in Korean.
{"correctedVersion":"naturally corrected ${activeLang} — sound like a native speaker","corrections":[{"original":"exact phrase","correction":"better phrase","explanation":"왜 틀렸는지 또는 왜 이게 더 자연스러운지 한국어로 설명"}],"naturalExpressions":[{"expression":"native ${activeLang} phrase","usage":"언제 어떻게 쓰는지 한국어로 설명"}],"followUpQuestion":"fun follow-up question in ${activeLang}","encouragement":"한국어로 짧고 따뜻한 격려 한마디"}
0-3 corrections for real errors only. Exactly 3 naturalExpressions.`;
          const t=await callAI(`Topic: ${topic.title}\nLevel: ${selectedQ.level}\nQ: ${selectedQ.question}\nStudent: ${userResp}`,sys);
          setFeedback(parseJSON(t));setScreen("feedback");
        },"speaking");
      }

      async function submitFollowup(){
        if(!followup.trim()) return;
        setLoadingMsg("마무리 피드백 정리 중");setScreen("loading");
        await run(async()=>{
          const sys=`You are a friendly ${activeLang} teacher. Return ONLY valid JSON no markdown.
{"correctedVersion":"corrected ${activeLang}","corrections":[{"original":"","correction":"","explanation":"한국어 설명"}],"finalNote":"오늘 학습에 대한 따뜻한 마무리 코멘트 한국어 2문장","todaysPhrases":["오늘 배운 핵심 ${activeLang} 표현 1","표현 2","표현 3"]}
0-3 corrections. todaysPhrases must be ${activeLang} phrases (not Korean).`;
          const t=await callAI(`Q: ${feedback.followUpQuestion}\nAnswer: ${followup}`,sys);

        stopSpeak();setScreen("home");

          <div style={S.header}>
            <div style={S.masthead}>{L.title}</div>
            <div style={{textAlign:"right"}}>

              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:C.muted,marginTop:2}}>{new Date().toLocaleDateString("ko-KR")}</div>

          {error&&(

                    <button key={k} onClick={()=>switchLang(k)} style={{
                      background:activeLang===k?C.gold:"transparent",
                      color:activeLang===k?C.bg:C.creamMuted,
                      border:`1px solid ${activeLang===k?C.gold:C.cardBorder}`,
                      padding:"9px 20px",borderRadius:20,fontSize:14,
                      fontFamily:"'DM Sans',sans-serif",cursor:"pointer",transition:"all 0.2s",
                      fontWeight:activeLang===k?600:400,
                    }}>
                      {LANG_CONFIG[k].emoji} {LANG_CONFIG[k].name}
                    </button>
                  ))}
                </div>

                <div style={{textAlign:"center",marginBottom:24}}>
                  <div style={{fontSize:48,marginBottom:10}}>🎧</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:38,fontWeight:400,lineHeight:1.15,color:C.cream,marginBottom:8}}>
                    들려야<br/><span style={{color:C.gold,fontStyle:"italic"}}>말할 수 있다</span>
                  </div>
                  <p style={{color:C.creamMuted,fontSize:14,lineHeight:1.9,marginTop:10}}>
                    매일 재미있는 콘텐츠로<br/>
                    <strong style={{color:C.cream}}>듣기 → 쉐도잉 → 스피킹</strong> 루틴
                  </p>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>

                    <div key={l} style={{...S.card,textAlign:"center",padding:"14px 8px"}}>

                </div>
                <button style={S.btn} onClick={fetchTopics}>오늘의 {L.name} 주제 가져오기 →</button>
              </div>

            {screen==="selecting"&&(

                <p style={{color:C.creamMuted,fontSize:13,marginBottom:18,lineHeight:1.7}}>선택하면 듣기 → 쉐도잉 → 스피킹 순서로 진행됩니다.</p>
                {topics.map(t=><TopicCard key={t.id} topic={t} onSelect={startLesson}/>)}
                <button style={S.btn} onClick={fetchTopics}>🔄 다른 주제 가져오기</button>
                {/* Fix 5: 레슨 중 언어 변경 — 선택 화면에선 허용하되 확인만 */}
                <button style={S.btnSec} onClick={()=>setScreen("home")}>← 홈으로</button>

                {lesson.shadowSentences?.map((s,i)=>(

                      <button onClick={()=>setDone(d=>d.includes(i)?d.filter(x=>x!==i):[...d,i])}
                        style={{background:done.includes(i)?"#1e3a2a":"transparent",border:`1px solid ${done.includes(i)?C.success:C.cardBorder}`,borderRadius:8,padding:"8px 14px",color:done.includes(i)?C.success:C.creamMuted,fontFamily:"'DM Sans',sans-serif",fontSize:12,cursor:"pointer",marginLeft:"auto"}}>
                        {done.includes(i)?"✅ 완료":"☐ 완료"}
                      </button>
                    </div>
                  </div>
                ))}
                <div style={{textAlign:"center",marginBottom:14}}>
                  <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:done.length>=3?C.gold:C.muted}}>{done.length}/5 완료</span>
                </div>
                <button style={S.btn} onClick={()=>setScreen("speaking")}>{done.length>=3?"🎤 스피킹 시작하기 →":"건너뛰고 스피킹 →"}</button>
                <button style={S.btnSec} onClick={()=>setScreen("listening")}>← 듣기로</button>
              </div>
            )}

            {/* SPEAKING */}
            {screen==="speaking"&&lesson&&(
              <div style={{paddingTop:32}}>
                <StepBar step={3}/>

                <div style={S.h2}>난이도를 선택하세요</div>
                <p style={{color:C.creamMuted,fontSize:13,marginBottom:18,lineHeight:1.7}}>원하는 난이도의 질문을 선택하고 {L.name}로 답해보세요.</p>

                {lesson.speakingQuestions?.map((q,i)=>(
                  <QuestionCard key={i} q={q} selected={selectedQ?.level===q.level} onSelect={setSelectedQ} langCode={L.code} voiceStart={L.voiceStart}/>
                ))}

                {selectedQ&&(
                  <div style={{...S.card,borderTop:`2px solid ${LEVEL_COLOR[selectedQ.level]||C.gold}`,marginTop:4}}>
                    <div style={S.h3}>{hasMic?"🎤 음성으로 답하기":`✍️ ${L.name}로 입력하기`}</div>
                    {hasMic?(
                      <>
                        <MicButton onTranscript={setUserResp} langCode={L.code}/>
                        {userResp&&<><div style={{...S.h3,marginBottom:6,marginTop:10}}>📝 인식된 텍스트 (수정 가능)</div><textarea style={S.textarea} value={userResp} onChange={e=>setUserResp(e.target.value)}/></>}
                        {!userResp&&<><div style={{color:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:12,marginBottom:8,textAlign:"center"}}>또는 직접 입력</div><textarea style={{...S.textarea,minHeight:80}} value={userResp} onChange={e=>setUserResp(e.target.value)} placeholder={`${L.name}로 입력...`}/></>}
                      </>
                    ):(
                      <textarea style={S.textarea} value={userResp} onChange={e=>setUserResp(e.target.value)} placeholder="Type your response..."/>
                    )}
                  </div>
                )}

                {!selectedQ&&(
                  <div style={{...S.card,background:"#0a1220",border:`1px dashed ${C.cardBorder}`,textAlign:"center"}}>
                    <div style={{color:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:14}}>↑ 위에서 난이도를 선택해주세요</div>
                  </div>

                <StepBar step={4}/>
                <div style={S.label}>STEP 5 — 피드백</div>
                {selectedQ&&(
                  <div style={{display:"inline-flex",alignItems:"center",gap:6,background:LEVEL_COLOR[selectedQ.level]+"22",border:`1px solid ${LEVEL_COLOR[selectedQ.level]}`,borderRadius:20,padding:"4px 14px",marginBottom:14}}>

                <div style={S.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={S.h3}>✅ 교정된 버전</div>
                    <ListenBtn text={feedback.correctedVersion} label="🔊 듣기" langCode={L.code} voiceStart={L.voiceStart}/>
                  </div>
                  <p style={{color:C.success,lineHeight:1.85,fontSize:15,margin:0,fontStyle:"italic"}}>{feedback.correctedVersion}</p>
                </div>

                {feedback.corrections?.length>0&&(
                  <div style={S.card}>
                    <div style={S.h3}>📝 교정 포인트</div>

                      <div key={i} style={{background:"#0a1220",border:`1px solid ${C.cardBorder}`,borderRadius:8,padding:"12px 14px",marginBottom:8}}>

                          <span style={{fontSize:13,color:C.error,textDecoration:"line-through",fontStyle:"italic"}}>{c.original}</span>
                          <span style={{color:C.muted}}>→</span>
                          <span style={{fontSize:13,color:C.success,fontWeight:600}}>{c.correction}</span>
                        </div>
                        <div style={{fontSize:13,color:C.creamMuted,fontFamily:"'DM Sans',sans-serif",paddingTop:6,borderTop:`1px solid ${C.cardBorder}`}}>🇰🇷 {c.explanation}</div>
                      </div>
                    ))}
                  </div>
                )}
                {feedback.corrections?.length===0&&(
                  <div style={{...S.card,borderColor:"#1e3a2a",background:"#0a1a0f"}}>
                    <div style={{color:C.success,fontFamily:"'DM Sans',sans-serif",fontSize:14}}>🎉 완벽해요! 교정할 부분이 없습니다.</div>
                  </div>
                )}

                <div style={S.card}>
                  <div style={S.h3}>⚡ 원어민 표현 3가지</div>
                  {feedback.naturalExpressions?.map((e,i)=>(
                    <div key={i} style={{background:"#0a1220",border:`1px solid #1e3a2a`,borderRadius:8,padding:"12px 14px",marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:C.goldLight}}>"{e.expression}"</div>
                        <ListenBtn text={e.expression} label="🔊" langCode={L.code} voiceStart={L.voiceStart}/>
                      </div>
                      <div style={{fontSize:13,color:C.creamMuted,fontFamily:"'DM Sans',sans-serif"}}>🇰🇷 {e.usage}</div>
                    </div>
                  ))}
                </div>

                <div style={{...S.card,borderLeft:`3px solid ${C.gold}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={S.h3}>💬 추가 질문</div>

                </div>

                <div style={{...S.card,borderColor:"#1e3a2a",background:"#091510"}}>
                  <div style={{color:C.creamMuted,lineHeight:1.8,fontSize:15}}>{finalFb.finalNote}</div>
                </div>

                <button style={S.btn} onClick={reset}>홈으로 돌아가기</button>
                <button style={S.btnSec} onClick={()=>{reset();setTimeout(fetchTopics,100);}}>다른 주제로 한 번 더 →</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
